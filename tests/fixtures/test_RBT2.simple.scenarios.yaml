robot:
  address: 192.168.0.100
  enforce_sim_mode: false
analysis:
  runs: 3
  warmup_runs: 0
  alignment_run: false
  contingency_percent: 20
  output_dir: artifacts/test_RBT2_simple
checkpoints:
  - checkpoint_id: 1
    label: station_1_start
    timeout_s: 10.0
  - checkpoint_id: 2
    label: planner_handoff
    timeout_s: 10.0
    queue_next_run: true
  - checkpoint_id: 3
    label: cycle_complete
    timeout_s: 10.0
scenarios:
  profiles:
    - name: baseline
      variables:
        SPD_INSERT: 150
        SPD_RETRACT: 800
        GRP_DELAY: 0.20